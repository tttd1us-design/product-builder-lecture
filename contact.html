<body>
  <div class="container">
    <div class="contact-card">
      <h1>🤝 제휴 문의</h1>
      <p>협업 제안이나 문의사항이 있으시면 아래 양식을 작성해 주세요.</p>
      
      <form action="https://formspree.io/f/mbdpzndv" method="POST">
        <div class="form-group">
          <label for="name">성함 / 회사명</label>
          <input type="text" id="name" name="name" placeholder="홍길동" required>
        </div>
        
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
        </div>
        
        <div class="form-group">
          <label for="subject">문의 제목</label>
          <input type="text" id="subject" name="subject" placeholder="제휴 제안 드립니다" required>
        </div>
        
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="5" placeholder="내용을 입력해 주세요" required></textarea>
        </div>
        
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
      
      <div class="footer">
        <a href="index.html">홈으로 돌아가기</a>
      </div>
    </div>
