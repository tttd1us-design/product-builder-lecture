<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>런던 여행지 추천</title>
  <link rel="stylesheet" href="london-style.css">
</head>
<body>
  <div class="header">
    <h1>🇬🇧 런던에서 꼭 가봐야 할 10곳</h1>
    <p>런던의 역사와 현대가 공존하는 최고의 명소를 소개합니다.</p>
    <a href="index.html" class="back-link">← 로또 생성기로 돌아가기</a>
  </div>

  <div class="container">
    <div id="place-list" class="grid">
      <!-- Places will be injected by JavaScript -->
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2 id="modal-title">장소 이름</h2>
      <p id="modal-description">장소 설명</p>
    </div>
  </div>

  <script src="london-main.js"></script>
</body>
</html>
